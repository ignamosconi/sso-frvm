<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTN FRVM - Single Sign On</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo-row">
      <div class="logo-circle">
        <img src="/app/assets/logo-utn.png" alt="UTN">
      </div>
      <div class="logo-text"><strong>UTN FRVM</strong></div>
    </div>
    <h1 class="login-title">Iniciar sesión</h1>
    <p class="login-sub">Ingresá con tus credenciales de autogestión</p>
    
    <div id="errorBox" class="error-msg"></div>

    <form id="loginForm" onsubmit="executeLogin(event)">
      <label class="field-label">Legajo</label>
      <input id="legajo" class="field-input" type="text" placeholder="Ej: 15288" required>
      
      <label class="field-label">Contraseña</label>
      <input id="password" class="field-input" type="password" placeholder="••••••••" required>
      
      <button type="submit" class="btn-login">Ingresar</button>
    </form>

    <hr class="divider">
    <p class="login-footer">Al ingresar confirmás que sos parte de UTN FRVM.<br>Tus credenciales no se comparten con NINGUNA app.</p>
  </div>
</div>

<script>
  async function executeLogin(event) {
    event.preventDefault();
    const errorBox = document.getElementById('errorBox');
    const legajo = document.getElementById('legajo').value;
    const password = document.getElementById('password').value;
    
    errorBox.style.display = 'none';

    try {
      const response = await fetch('/oauth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ legajo, password })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || 'Error desconocido al autenticar.');
      }

      // --- Pantalla de éxito dinámica (Fondo blanco y cartel verde) ---
      
      // 1. Cambiamos los estilos del body
      document.body.style.background = '#ffffff';
      document.body.style.minHeight = '100vh';
      document.body.style.display = 'flex';
      document.body.style.alignItems = 'center';
      document.body.style.justifyContent = 'center';
      document.body.style.margin = '0';

      // 2. Reemplazamos el contenido sumando el logo institucional abajo
      document.body.innerHTML = `
        <div style="text-align: center; font-family: 'Inter', sans-serif; padding: 2rem;">
          <!-- Cartel Verde Estilizado -->
          <div style="
            background-color: #ecfdf5; 
            border: 1px solid #10b981; 
            color: #065f46; 
            padding: 1rem 2.5rem; 
            border-radius: 8px; 
            display: inline-block; 
            font-size: 18px; 
            font-weight: 600; 
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
          ">
            ¡Logueo exitoso!
          </div>
          
          <!-- Texto Secundario -->
          <p style="color: #64748b; font-size: 14px; margin: 0 0 2.5rem 0;">
            Podés cerrar esta página ahora.
          </p>

          <!-- Logo Horizontal UTN FRVM -->
          <div style="animation: fadeIn 0.6s ease-out;">
            <img src="/app/assets/logo-completo.png" alt="UTN FRVM" style="
              width: 100%;
              max-width: 280px;
              height: auto;
              opacity: 0.9;
            ">
          </div>
        </div>

        <!-- Pequeña animación para que el logo aparezca suavemente -->
        <style>
          @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
          }
        </style>
      `;

      // 3. Ejecutamos la comunicación con la ventana madre
      if (window.opener) {
        window.opener.postMessage({ status: 'success', user: data }, '*');
      }

    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/app/assets/logo-utn.png">
  <title>Credenciales OAuth — UTN FRVM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app/credentials/style.css">
</head>
<body>
  <div class="wrap">

    <div class="logo-row">
      <div class="logo-circle">
        <img src="/app/assets/logo-utn.png" alt="UTN">
      </div>
      <div class="logo-text"><strong>UTN FRVM</strong> — SSO</div>
    </div>

    <div class="card" id="card">
      <div class="loading-state">Cargando credenciales…</div>
    </div>

    <div class="footer">
      Guardá estas credenciales en un lugar seguro. Si perdés el Client Secret, contactá al administrador para regenerarlo.
    </div>

    <div class="logo-footer">
      <img src="/app/assets/logo-completo-light.png" alt="UTN FRVM">
    </div>

  </div>

  <script src="/app/credentials/script.js"></script>
</body>
</html>
